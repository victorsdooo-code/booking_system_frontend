<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>青苗綜合醫療診所 - 管理後台</title>
    <style>
        :root { --primary: #2D5A3D; --primary-light: #4A7C59; --danger: #dc3545; }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: all; -webkit-user-select: all; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        
        .login-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, var(--primary), #1E3D2A); }
        .login-box { background: white; padding: 40px; border-radius: 12px; width: 100%; max-width: 360px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .login-box h1 { color: var(--primary); text-align: center; margin-bottom: 8px; }
        .login-box input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 16px; font-size: 16px; }
        .login-box button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .login-box button:hover { background: var(--primary-light); }
        .login-error { color: var(--danger); text-align: center; margin-top: 12px; display: none; }
        
        .admin-container { display: none; min-height: 100vh; }
        .admin-container.active { display: flex; }
        .sidebar { width: 240px; background: var(--primary); color: white; padding: 20px; }
        .sidebar h2 { margin-bottom: 20px; }
        .nav-btn { width: 100%; padding: 12px; background: transparent; border: none; color: white; text-align: left; cursor: pointer; margin-bottom: 8px; border-radius: 6px; }
        .nav-btn.active, .nav-btn:hover { background: rgba(255,255,255,0.2); }
        
        .main { flex: 1; padding: 24px; overflow-y: auto; }
        h1 { margin-bottom: 24px; }
        
        table { width: 100%; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: var(--primary); color: white; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
    </style>
</head>
<body>
    <div class="login-container" id="loginPage">
        <div class="login-box">
            <h1>青苗綜合醫療診所</h1>
            <p style="text-align:center;color:#666;margin-bottom:20px">管理後台登入</p>
            <input type="password" id="password" placeholder="請輸入密碼">
            <button onclick="login()">登入</button>
            <p class="login-error" id="loginError">密碼錯誤，請重試</p>
        </div>
    </div>
    
    <div class="admin-container" id="adminContainer">
        <div class="sidebar">
            <h2>管理後台</h2>
            <button class="nav-btn active" onclick="showSection('bookings')">📅 預約列表</button>
            <button class="nav-btn" onclick="logout()">🚪 登出</button>
        </div>
        <div class="main">
            <h1>預約列表</h1>
            <table>
                <thead><tr><th>ID</th><th>日期</th><th>時間</th><th>姓名</th><th>電話</th><th>服務</th><th>狀態</th></tr></thead>
                <tbody id="bookingsTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE = 'https://booking-system-backend-2t8v.onrender.com/api';
        const ADMIN_PASSWORD = 'admin123';
        
        function login() {
            var pwd = document.getElementById('password').value;
            if(pwd === ADMIN_PASSWORD) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('adminContainer').classList.add('active');
                loadBookings();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }
        
        function logout() {
            document.getElementById('adminContainer').classList.remove('active');
            document.getElementById('loginPage').style.display = 'flex';
        }
        
        function showSection(id) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }
        
        async function loadBookings() {
            const tbody = document.getElementById('bookingsTable');
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">載入中...</td></tr>';
            try {
                const res = await fetch(API_BASE + '/admin/appointments?token=' + ADMIN_PASSWORD);
                const data = await res.json();
                const bookings = data.appointments || data;
                if(bookings.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">暫無預約</td></tr>';
                    return;
                }
                tbody.innerHTML = bookings.map(b => 
                    '<tr><td>' + b.id + '</td><td>' + b.date + '</td><td>' + b.time + '</td><td>' + (b.name || b.patientName) + '</td><td>' + b.phone + '</td><td>' + (b.doctorName || '') + '</td><td>' + (b.status || 'confirmed') + '</td></tr>'
                ).join('');
            } catch(e) {
                const errLog = document.getElementById('errorLogs'); errLog.innerHTML += '<div>[' + new Date().toISOString() + '] Load failed: ' + e.message + '</div>'; tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">載入失敗: ' + e.message + '</td></tr>';
            }
        }
    </script>

        <div style="margin-top: 20px; padding: 10px; background: #ffeeee; border-radius: 8px;">
            <h3>Error Logs</h3>
            <div id="errorLogs" style="font-size: 12px; max-height: 200px; overflow: auto;"></div>
        </div>
</body>
</html>
